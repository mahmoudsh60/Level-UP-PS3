<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LevelUP PS3 Mod Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* الألوان الجديدة: كحلي غامق وبرتقالي */
            --bg-color: #0b0f19; 
            --card-bg: #151b2b;
            --primary-color: #ff9900; 
            --primary-hover: #e68a00;
            --text-main: #ffffff;
            --text-muted: #a0aabf;
            --danger: #ff4757;
            --fb-color: #1877F2;
            --border-color: #2a3441;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 80px;
        }

        /* شريط المعلومات العلوي */
        .top-info-bar {
            background-color: #05080f;
            color: var(--primary-color);
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
        }

        .top-info-bar a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }

        header {
            background-color: #0a0d14;
            padding: 20px 15px;
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        header span { color: var(--primary-color); }

        .fb-link {
            display: inline-block;
            margin-top: 10px;
            background-color: var(--fb-color);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px 15px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
        }

        .search-box button {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: bold;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s;
        }
        
        .search-box button:hover {
            background-color: var(--primary-hover);
        }

        .filter-section { margin-bottom: 20px; background: var(--card-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); }
        
        .filter-title {
            font-size: 14px;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .filter-btn {
            background-color: #1a2235;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            transition: 0.2s;
        }

        .filter-btn:hover { background-color: #232d42; }

        .filter-btn.active {
            background-color: var(--primary-color);
            color: #000;
            border-color: var(--primary-color);
            font-weight: bold;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 15px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(255, 153, 0, 0.15);
            border-color: #3a4759;
        }

        .card-header {
            background-color: #10141f;
            padding: 15px 10px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        .game-title {
            color: var(--primary-color);
            font-size: 16px;
            font-weight: 700;
            margin: 0;
            line-height: 1.4;
        }

        .card-content {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .tags { margin-bottom: 10px; text-align: center; }

        .tag {
            display: inline-block;
            background-color: #222b3d;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            margin: 2px;
            color: var(--text-main);
            border: 1px solid #364259;
        }

        .info-text {
            font-size: 13px;
            color: #ccc;
            margin-bottom: 6px;
            text-align: center;
            font-weight: bold;
        }

        .card-actions {
            margin-top: auto;
            padding-top: 12px;
            display: flex; gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-family: 'Tajawal', sans-serif;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 13px;
            transition: 0.2s;
        }

        .btn-add { background-color: var(--primary-color); color: #000; }
        .btn-add:hover { background-color: var(--primary-hover); }
        .btn-add.added { background-color: var(--danger); color: white; }
        .btn-yt { background-color: #d32f2f; color: white; }
        .btn-yt:hover { background-color: #b71c1c; }

        .cart-float {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: var(--primary-color);
            color: #000;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(255, 153, 0, 0.4);
            cursor: pointer;
            border: none;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }
        
        .cart-float:hover {
            transform: scale(1.05);
            background-color: var(--primary-hover);
        }

        .cart-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1001;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .cart-content {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 450px;
            border-radius: 12px;
            padding: 20px;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid var(--primary-color);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 15px;
        }
        
        .cart-header h2 { margin: 0; color: var(--primary-color); }

        .user-info-section {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .user-info-section input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: #1a2235;
            color: white;
            font-family: 'Tajawal', sans-serif;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            border-bottom: 1px dashed #364259;
            padding-bottom: 8px;
        }

        .cart-summary {
            background-color: #1a2235;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .cart-summary h3 {
            margin: 0 0 8px 0;
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .cart-summary h2 {
            color: var(--primary-color);
        }

        .whatsapp-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-whatsapp:hover { background-color: #128C7E; }
        .close-cart { background: none; border: none; color: white; font-size: 24px; cursor: pointer; transition: 0.2s; }
        .close-cart:hover { color: var(--danger); }

        @media (max-width: 600px) {
            .top-info-bar { flex-direction: column; gap: 5px; text-align: center; }
            header h1 { font-size: 24px; }
            .filter-section { padding: 10px; }
        }
    </style>
</head>

        let cart = [];
        let activeGenres = [];
        let activePlayers = [];
        let activeSizes = [];

        function toggleFilter(type, value, btnElement) {
            btnElement.classList.toggle('active');
            if(type === 'genre') {
                if(activeGenres.includes(value)) activeGenres = activeGenres.filter(g => g !== value);
                else activeGenres.push(value);
            } else if (type === 'players') {
                if(activePlayers.includes(value)) activePlayers = activePlayers.filter(p => p !== value);
                else activePlayers.push(value);
            } else if (type === 'size') {
                if(activeSizes.includes(value)) activeSizes = activeSizes.filter(s => s !== value);
                else activeSizes.push(value);
            }
            renderGames();
        }

        function handleEnter(e) { if(e.key === 'Enter') renderGames(); }

        function toggleCart(id) {
            const game = gamesDB.find(g => g.id === id);
            const index = cart.findIndex(g => g.id === id);
            if(index > -1) cart.splice(index, 1);
            else cart.push(game);
            updateCartUI();
            renderGames();
        }

        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';
            gamesDB.forEach(game => {
                if (searchText && !game.name.toLowerCase().includes(searchText)) return;
                if (activeGenres.length > 0 && !game.genres.some(g => activeGenres.includes(g))) return;
                if (activePlayers.length > 0 && !activePlayers.some(p => game.maxPlayers >= p)) return;
                if (activeSizes.length > 0) {
                    const matchSize = activeSizes.some(s => {
                        if (s === 5) return game.maxSize <= 5;
                        if (s === 10) return game.maxSize <= 10;
                        if (s === 20) return game.maxSize <= 20;
                        if (s === 21) return game.maxSize > 20;
                    });
                    if (!matchSize) return;
                }
                const inCart = cart.some(c => c.id === game.id);
                const ytLink = `https://www.youtube.com/results?search_query=${encodeURIComponent("PS3 " + game.name + " gameplay")}`;
                let tagsHTML = game.genres.map(g => `<span class="tag">${g}</span>`).join('');
                let sizeDisplay = (game.minSize === game.maxSize) ? `${game.minSize} GB` : `${game.minSize} - ${game.maxSize} GB`;
                
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-header"><h3 class="game-title">${game.name}</h3></div>
                        <div class="card-content">
                            <div class="tags">${tagsHTML}</div>
                            <div class="info-text">🎮 اللاعبين: ${game.playersTxt}</div>
                            <div class="info-text">💾 المساحة: <span dir="ltr">${sizeDisplay}</span></div>
                            <div class="card-actions">
                                <button class="btn ${inCart ? 'btn-add added' : 'btn-add'}" onclick="toggleCart(${game.id})">
                                    ${inCart ? '❌ إزالة' : '➕ إضافة'}
                                </button>
                                <a href="${ytLink}" target="_blank" class="btn btn-yt">▶ فيديو</a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const list = document.getElementById('cartItemsList');
            list.innerHTML = '';
            let minTotal = 0, maxTotal = 0;
            if(cart.length === 0) list.innerHTML = '<p style="text-align:center; color:#aaa;">السلة فارغة حالياً</p>';
            cart.forEach(game => {
                minTotal += game.minSize; maxTotal += game.maxSize;
                let itemSizeText = (game.minSize === game.maxSize) ? `${game.minSize} GB` : `${game.minSize}-${game.maxSize} GB`;
                list.innerHTML += `<div class="cart-item"><span>${game.name}</span><span style="color:var(--primary-color);" dir="ltr">${itemSizeText}</span></div>`;
            });
            document.getElementById('totalSizeUI').innerText = (minTotal === maxTotal) ? `${minTotal} GB` : `${minTotal} - ${maxTotal} GB`;
        }

        function openCart() { document.getElementById('cartModal').style.display = 'flex'; }
        function closeCart() { document.getElementById('cartModal').style.display = 'none'; }

        function sendWhatsApp(phone) {
            const name = document.getElementById('userName').value.trim();
            const contact = document.getElementById('userPhone').value.trim();
            if(!name || !contact) { alert("من فضلك اكتب اسمك ورقم تليفونك أولاً!"); return; }
            if(cart.length === 0) { alert("يرجى اختيار ألعاب أولاً!"); return; }

            let minTotal = 0, maxTotal = 0;
            let text = `مرحباً LevelUP،\nأنا ${name} (رقمي: ${contact})\nأود تثبيت ألعاب الـ PS3 التالية على جهازي:\n`;
            cart.forEach((game, index) => {
                let sizeTxt = (game.minSize === game.maxSize) ? `${game.minSize} GB` : `${game.minSize}-${game.maxSize} GB`;
                text += ` ${index + 1}. ${game.name} (${sizeTxt})\n`;
                minTotal += game.minSize; maxTotal += game.maxSize;
            });
            let finalTotalTxt = (minTotal === maxTotal) ? `${minTotal} جيجابايت` : `من ${minTotal} إلى ${maxTotal} جيجابايت`;
            text += `\nإجمالي المساحة المطلوبة: ${finalTotalTxt}.`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
        }

        renderGames(); updateCartUI();
    </script>
